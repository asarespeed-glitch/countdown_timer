<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Live Registration & Verification System</title>
    <meta name="description" content="Secure, live registration portal featuring instant verification status tracking and high-performance layout.">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Registration Portal">

    <meta property="og:title" content="Live Registration & Verification System">
    <meta property="og:description" content="Sign up and manage verified registrants instantly in real-time.">
    <meta property="og:type" content="website">

    <link rel="icon" type="image/svg+xml" href="https://api.dicebear.com/7.x/initials/svg?seed=W&backgroundColor=1e3799&fontSize=60">
    <link rel="alternate icon" type="image/png" href="https://api.dicebear.com/7.x/initials/png?seed=W&backgroundColor=1e3799">

    <style>
        /* Define the dynamic, moving sky gradient background */
        @keyframes skyGradient {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Shifting colors: cosmic purple -> deep blue -> sunset orange -> blue */
            background: linear-gradient(-45deg, #231131, #0c2461, #f3a683, #1e3799);
            background-size: 400% 400%;
            animation: skyGradient 15s ease infinite;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative; /* Container for touch effect */
        }

        /* Glassmorphism for the containers (Frosted Glass Effect) */
        .container, .list-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            z-index: 10; /* Keep text above background touch effects */
        }

        .list-container {
            padding: 20px;
        }

        h2, h3 { 
            color: #fff; 
            margin-top: 0; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        label { 
            font-weight: bold; 
            display: block; 
            margin: 10px 0 5px; 
            color: rgba(255, 255, 255, 0.9);
        }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            box-sizing: border-box;
            color: #fff;
            font-size: 16px;
        }

        input[type="text"]::placeholder, input[type="email"]::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        input[type="text"]:focus, input[type="email"]:focus {
            outline: none;
            border-color: #f3a683; /* Sunset highlight on focus */
            background: rgba(255, 255, 255, 0.1);
        }

        button {
            background-color: #28a745; /* Modern Green */
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s ease, transform 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover { 
            background-color: #218838; 
            transform: translateY(-1px);
        }
        
        button:active {
            transform: translateY(1px);
        }

        .message-box {
            padding: 15px;
            border-radius: 4px;
            margin-top: 15px;
            display: none;
            font-weight: 500;
        }

        .error { background-color: rgba(248, 215, 218, 0.9); color: #721c24; border: 1px solid #f5c6cb; }
        .success { background-color: rgba(212, 237, 218, 0.9); color: #155724; border: 1px solid #c3e6cb; }

        ul { list-style-type: none; padding: 0; }
        li {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
        }
        
        li:last-child {
            border-bottom: none;
        }

        /* Styles for the Dynamic Touch Effect Particles */
        .touch-particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none; /* Ignore clicks */
            background: rgba(130, 204, 221, 0.7); /* Subtle Blue/Aqua glow */
            box-shadow: 0 0 10px rgba(130, 204, 221, 0.9), 0 0 20px rgba(130, 204, 221, 0.5);
            transform: translate(-50%, -50%) scale(0);
            animation: touchRipple 0.8s ease-out;
            z-index: 1; /* Below form/list boxes */
        }

        @keyframes touchRipple {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Registrant Sign Up</h2>
        <form id="registrationForm" action="https://formspree.io/f/xaqgegzk" method="POST">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="Registrant Name" placeholder="John Doe" required>

            <label for="userEmail">Your Email</label>
            <input type="email" id="userEmail" name="Registrant Email" placeholder="you@example.com" required>

            <button type="submit">Submit & Verify</button>
        </form>

        <div id="statusMessage" class="message-box"></div>
    </div>

    <div class="list-container">
        <h3>Approved Registrants</h3>
        <ul id="registrantList">
        </ul>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const statusMessage = document.getElementById('statusMessage');
        const registrantList = document.getElementById('registrantList');

        let approvedRegistrants = [];

        // --- SUBMISSION LOGIC ---
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('fullName').value;
            const data = new FormData(form);

            statusMessage.style.display = "none";
            statusMessage.className = "message-box";

            try {
                // Send form data to Formspree backend
                const response = await fetch(form.action, {
                    method: form.method,
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    // Admin verification logic path
                    const verificationCheck = confirm(`Data emailed to asarespeed@gmail.com!\n\nVerify registrant "${name}" for the web page list?\n\nClick OK for YES, Cancel for NO.`);

                    if (verificationCheck) {
                        approvedRegistrants.push(name);
                        updateRegistrantList();
                        
                        statusMessage.textContent = "Verification Successful! You have been added to the list.";
                        statusMessage.className = "message-box success";
                        statusMessage.style.display = "block";
                        form.reset();
                    } else {
                        statusMessage.textContent = "Verification Failed. Please either restart the whole registration process or call the technical team for assistance.";
                        statusMessage.className = "message-box error";
                        statusMessage.style.display = "block";
                    }
                } else {
                    throw new Error("Formspree error response");
                }
            } catch (error) {
                statusMessage.textContent = "Oops! There was a problem submitting your form.";
                statusMessage.className = "message-box error";
                statusMessage.style.display = "block";
            }
        });

        function updateRegistrantList() {
            registrantList.innerHTML = '';
            if(approvedRegistrants.length === 0) {
                registrantList.innerHTML = '<li>No approved registrants yet.</li>';
                return;
            }
            approvedRegistrants.forEach(registrant => {
                const li = document.createElement('li');
                li.textContent = registrant;
                registrantList.appendChild(li);
            });
        }

        // --- DYNAMIC TOUCH EFFECT LOGIC ---
        document.addEventListener('click', createTouchEffect);
        document.addEventListener('touchstart', (e) => createTouchEffect(e.touches[0]));

        function createTouchEffect(e) {
            if (e.target !== document.body && !document.body.contains(e.target)) return;
            if (e.target.closest('.container') || e.target.closest('.list-container')) return;

            const effect = document.
