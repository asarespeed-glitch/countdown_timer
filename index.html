<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All_gamers</title>
    <style>
        /* --- Background & Base Styling --- */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Animated gradient background */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
        }

        /* Animation keyframes for the background */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Countdown Container Styling --- */
        .countdown-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.4); /* Semi-transparent dark overlay */
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px); /* Glassmorphism effect */
        }

        h1 {
            margin-top: 0;
            font-size: 2.5rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* --- Timer Layout --- */
        #countdown {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap; /* Allows stacking on very small screens */
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            min-width: 90px;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
        }

        .time-box span {
            font-size: 3.5rem;
            font-weight: bold;
        }

        .label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* --- Finished Message --- */
        #message {
            font-size: 2.5rem;
            font-weight: bold;
            margin-top: 20px;
            display: none; /* Hidden until countdown finishes */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
  <p>@De Grants</p>
    <div class="countdown-container">
        <h1>Countdown to June 11, 2026</h1> 
        <p>Project commence</p>
        
        <div id="countdown">
            <div class="time-box">
                <span id="days">00</span>
                <div class="label">Days</div>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <div class="label">Hours</div>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <div class="label">Minutes</div>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <div class="label">Seconds</div>
            </div>
        </div>

        <div id="message">The Day Has Arrived!</div>
    </div>

    <script>
    
        // Set the exact date and time we are counting down to
        // Target: June 11, 2026 at midnight (00:00:00)
        const targetDate = new Date("June 11, 2026 00:00:00").getTime();

        // Update the countdown every 1 second (1000 milliseconds)
        const countdownInterval = setInterval(function() {
            
            // Get today's date and time
            const now = new Date().getTime();

            // Find the distance between now and the target date
            const distance = targetDate - now;

            // Time calculations for days, hours, minutes, and seconds
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Pad single digit numbers with a leading zero (e.g., "09" instead of "9")
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

            // If the countdown is finished, hide the timer and show the message
            if (distance < 0) {
                clearInterval(countdownInterval);
                document.getElementById("countdown").style.display = "none";
                document.getElementById("message").style.display = "block";
            }
        }, 1000);
    </script>
</body>
</html>
