<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeGrants Countdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Gaming Dark & Dynamic Background --- */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Deep dark base with dynamic glowing ambient light */
            background-color: #0b0c10;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(111, 66, 193, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 254, 0.15) 0%, transparent 50%);
            background-size: 200% 200%;
            animation: ambientGlow 10s ease infinite alternate;
            color: #c5c6c7;
            overflow: hidden;
        }

        /* Slow-moving dynamic ambient light for the gaming aesthetic */
        @keyframes ambientGlow {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        /* --- Main Container --- */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }

        .countdown-container {
            text-align: center;
            background: rgba(11, 12, 16, 0.75);
            padding: 40px 50px;
            border-radius: 12px;
            border: 2px solid #1f2833;
            /* Cyan neon glow outline */
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.15), inset 0 0 15px rgba(0, 242, 254, 0.05);
            backdrop-filter: blur(8px);
            width: 100%;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            margin-top: 0;
            font-size: 2.2rem;
            margin-bottom: 35px;
            letter-spacing: 3px;
            color: #00f2fe; /* High-tech Cyan */
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        /* --- Timer Layout --- */
        #countdown {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(31, 40, 51, 0.4);
            padding: 20px;
            border-radius: 8px;
            min-width: 100px;
            border-bottom: 3px solid #6f42c1; /* Purple accent base */
            transition: transform 0.2s;
        }

        .time-box:hover {
            transform: translateY(-5px);
            border-bottom: 3px solid #00f2fe; /* Turns cyan on hover */
        }

        .time-box span {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.8rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        .label {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
            color: #45f3ff;
            font-weight: bold;
        }

        /* --- Branding & Footer Section --- */
        .footer-section {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
        }

        .brand-name {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            margin-bottom: 15px;
        }

        /* --- Support / YouTube Button --- */
        .support-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #ff0000, #b30000); /* YouTube Red */
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
        }

        .support-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
            background: linear-gradient(135deg, #ff1a1a, #cc0000);
        }

        #message {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: bold;
            color: #00f2fe;
            display: none;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.6);
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="countdown-container">
            <h1>MISSION COUNTDOWN</h1>
            
            <div id="countdown">
                <div class="time-box">
                    <span id="days">00</span>
                    <div class="label">Days</div>
                </div>
                <div class="time-box">
                    <span id="hours">00</span>
                    <div class="label">Hours</div>
                </div>
                <div class="time-box">
                    <span id="minutes">00</span>
                    <div class="label">Min</div>
                </div>
                <div class="time-box">
                    <span id="seconds">00</span>
                    <div class="label">Sec</div>
                </div>
            </div>

            <div id="message">TIME ELAPSED</div>
        </div>

        <div class="footer-section">
            <div class="brand-name">DEGRANTS</div>
            <a href="https://www.youtube.com/@jwufuru" target="_blank" class="support-btn">
                Show Support on YouTube
            </a>
        </div>
    </div>

    <script>
        // Set the countdown target to exactly June 9, 2027 at midnight
        const targetDate = new Date("June 9, 2027 00:00:00").getTime();

        const countdownInterval = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(countdownInterval);
                document.getElementById("countdown").style.display = "none";
                document.getElementById("message").style.display = "block";
            }
        }, 1000);
    </script>
</body>
</html>
